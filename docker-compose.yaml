
services:
  user:
    build: ./user
    env_file:
      - ./user/.env
    ports:
      - "3001:3001"
    networks:
      - app-network


  chat:
    build: ./chat
    env_file:
      - ./chat/.env
    ports:
      - "3002:3002"
    networks:
      - app-network
    depends_on:
      - user

  email:
    build: ./email
    env_file:
      - ./email/.env
    ports:
      - "3003:3003"
    networks:
      - app-network

    depends_on:
      - user

networks:
  app-network:
    driver: bridge